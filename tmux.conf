# Key to quickly reload the config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded..."

# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB,xterm-256color:RGB"

# Scrollback
set -g history-limit 50000

# Behavior
set -sg escape-time 10
set -g set-clipboard on
setw -g monitor-activity on
set -g visual-activity off
setw -g aggressive-resize on
set -g display-panes-time 1500

# Indexing
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Colors
set -g status-bg "default"
set -g status-fg "#d6dccb"
set -g status-left "#[fg=#9caf88,bg=default,bold] #S #[fg=default,bg=default,nobold]"
set -g window-status-current-format "#[fg=#222720,bg=#9caf88,bold] #I #W #[fg=#9caf88,bg=default,nobold]"
set -g window-status-format "#[fg=#8a9a7b,bg=default] #I #W "
set -g window-status-activity-style "fg=#9caf88,bold"
set -g status-right "#[fg=#8a9a7b,bg=default,bold] %I:%M %p "

# Separators
set -g status-left-length 40
set -g status-right-length 40
set -g status-interval 5

# Transparency
set -g status-style bg=default
set -g message-style "bg=default,fg=#9caf88"
set -g message-command-style "bg=default,fg=#9caf88"
set -g pane-border-style "bg=default,fg=#3f463a"
set -g pane-active-border-style "bg=default,fg=#9caf88"

# Splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Kill without confirmation
bind x kill-pane
bind & kill-window
bind Q kill-session

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window reordering
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# Copy mode (vi)
setw -g mode-keys vi
set -g mode-style "bg=#9caf88,fg=#222720"
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
